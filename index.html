<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的雲端工具箱</title>
    <style>
    body { 
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        background: #fdf5f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 40px 20px; 
        margin: 0;
    }

    h1 { color: #333; margin-bottom: 40px; }

    /* 核心：自適應網格容器 */
    #tool-container { 
        display: grid; 
        /* 每個卡片最小 280px，剩下的空間自動填滿 */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 25px; 
        width: 100%; 
        max-width: 1200px; /* 限制最大寬度，避免在大螢幕太散 */
    }

    .card { 
        background: white; 
        border-radius: 20px; 
        padding: 30px 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        text-align: center; 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card:hover { transform: translateY(-10px); }

    .card h3 { color: #444; margin-bottom: 10px; }

    .card p { color: #777; font-size: 0.9em; margin-bottom: 20px; }

    .btn { 
        background: #ffb7b7; 
        color: white; 
        text-decoration: none; 
        padding: 12px 25px; 
        border-radius: 25px; 
        display: inline-block;
        font-weight: bold;
    }
        /* 貼在 <style> 標籤內 */
#winner-overlay {
    background: rgba(10, 15, 28, 0.85); /* 深邃底色 */
    backdrop-filter: blur(15px); /* 毛玻璃模糊 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.winner-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 15px 25px;
    color: #fff;
    animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; /* 入場動畫 */
    /* ...其他樣式... */
}

@keyframes cardPop {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>
    <h1>🚀 我的雲端工具自動選單</h1>
    <div id="tool-container">正在掃描雲端檔案...</div>

<script>
    const GITHUB_USER = "minrux"; // 確認這是你的帳號
    const REPO_NAME = "mytools";  // 確認這是你的倉庫名

    async function fetchTools() {
        const container = document.getElementById('tool-container');
        try {
            // 1. 嘗試抓取資料
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/`);
            
            // 2. 如果 GitHub 說找不到（404）或次數滿了
            if (!response.ok) {
                throw new Error(`GitHub API 回傳錯誤: ${response.status}。請檢查帳號與倉庫名是否正確。`);
            }

            const files = await response.json();
            container.innerHTML = '';

            // 3. 過濾 HTML 檔案
            const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

            if (htmlFiles.length === 0) {
                container.innerHTML = "<div>目前資料夾中沒有其他 HTML 檔案。</div>";
                return;
            }

            htmlFiles.forEach(file => {
                const card = document.createElement('div');
                card.className = 'card';
                const displayName = file.name.replace('.html', '').toUpperCase();
                card.innerHTML = `
                    <h3>${displayName}</h3>
                    <a href="${file.name}" class="btn">開啟工具</a>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            // 4. 把錯誤直接顯示在畫面上
            container.innerHTML = `<div style="color:red; padding:20px;">
                ❌ 讀取失敗！原因：${e.message}<br>
                請確認你的 Repository 是「Public」公開狀態。
            </div>`;
        }
    }
    fetchTools();
</script>
</body>
</html>
