<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的雲端工具箱</title>
    <style>
    body { 
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        background: #fdf5f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 40px 20px; 
        margin: 0;
    }

    h1 { color: #333; margin-bottom: 40px; }

    /* 核心：自適應網格容器 */
    #tool-container { 
        display: grid; 
        /* 每個卡片最小 280px，剩下的空間自動填滿 */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 25px; 
        width: 100%; 
        max-width: 1200px; /* 限制最大寬度，避免在大螢幕太散 */
    }

    .card { 
        background: white; 
        border-radius: 20px; 
        padding: 30px 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        text-align: center; 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card:hover { transform: translateY(-10px); }

    .card h3 { color: #444; margin-bottom: 10px; }

    .card p { color: #777; font-size: 0.9em; margin-bottom: 20px; }

    .btn { 
        background: #ffb7b7; 
        color: white; 
        text-decoration: none; 
        padding: 12px 25px; 
        border-radius: 25px; 
        display: inline-block;
        font-weight: bold;
    }
        /* 貼在 <style> 標籤內 */
#winner-overlay {
    background: rgba(10, 15, 28, 0.85); /* 深邃底色 */
    backdrop-filter: blur(15px); /* 毛玻璃模糊 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.winner-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 15px 25px;
    color: #fff;
    animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; /* 入場動畫 */
    /* ...其他樣式... */
}

@keyframes cardPop {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>
    <h1>🚀 我的雲端工具自動選單</h1>
    <div id="tool-container">正在掃描雲端檔案...</div>

    <script>
        // 【請修改這裡！】
        const GITHUB_USER = "minrux"; 
        const REPO_NAME = "mytools";

      // 找到這個函式並整個替換
function renderWinnerCards(winners) {
    const container = document.getElementById('winner-grid');
    container.innerHTML = '';
    
    // 智慧字體大小判斷 [cite: 64]
    let fontSize = "2rem";
    if (winners.length > 10) fontSize = "1.5rem";
    if (winners.length > 30) fontSize = "1.1rem";

    winners.forEach((name, index) => {
        const card = document.createElement('div');
        card.className = 'winner-card';
        card.style.fontSize = fontSize;
        // 關鍵：每個卡片延遲登場，創造儀式感 [cite: 17]
        card.style.animationDelay = `${index * 0.1}s`; 
        card.innerText = name;
        container.appendChild(card);
    });
}
    </script>
</body>
</html>
