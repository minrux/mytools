<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的雲端工具箱</title>
    <style>
    body { 
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        background: #fdf5f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 40px 20px; 
        margin: 0;
    }

    h1 { color: #333; margin-bottom: 40px; }

    /* 核心：自適應網格容器 */
    #tool-container { 
        display: grid; 
        /* 每個卡片最小 280px，剩下的空間自動填滿 */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 25px; 
        width: 100%; 
        max-width: 1200px; /* 限制最大寬度，避免在大螢幕太散 */
    }

    .card { 
        background: white; 
        border-radius: 20px; 
        padding: 30px 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        text-align: center; 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card:hover { transform: translateY(-10px); }

    .card h3 { color: #444; margin-bottom: 10px; }

    .card p { color: #777; font-size: 0.9em; margin-bottom: 20px; }

    .btn { 
        background: #ffb7b7; 
        color: white; 
        text-decoration: none; 
        padding: 12px 25px; 
        border-radius: 25px; 
        display: inline-block;
        font-weight: bold;
    }
        /* 貼在 <style> 標籤內 */
#winner-overlay {
    background: rgba(10, 15, 28, 0.85); /* 深邃底色 */
    backdrop-filter: blur(15px); /* 毛玻璃模糊 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.winner-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 15px 25px;
    color: #fff;
    animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; /* 入場動畫 */
    /* ...其他樣式... */
}

@keyframes cardPop {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>
    <h1>🚀 我的雲端工具自動選單</h1>
    <div id="tool-container">正在掃描雲端檔案...</div>

<script>
    const GITHUB_USER = "minrux"; 
    const REPO_NAME = "mytools";

    async function fetchTools() {
        const container = document.getElementById('tool-container');
        try {
            // 1. 抓取 GitHub 檔案清單 [cite: 37, 54]
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/`);
            const files = await response.json();
            container.innerHTML = '';

            const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

            // 2. 遍歷檔案，逐一「讀取內容」獲取描述
            for (const file of htmlFiles) {
                const card = document.createElement('div');
                card.className = 'card';
                
                // 讀取該檔案的 HTML 內容來抓取 meta description [cite: 36]
                const fileRes = await fetch(file.download_url);
                const htmlText = await fileRes.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const metaDesc = doc.querySelector('meta[name="description"]')?.content || "點擊開啟教學工具";

                // 檢查是否有對應的縮圖 (例如檔名.png)
                const imgUrl = file.name.replace('.html', '.png');
                const hasImg = files.some(f => f.name === imgUrl);
                const displayImg = hasImg ? imgUrl : 'https://via.placeholder.com/300x150?text=No+Preview';

                card.innerHTML = `
                    <img src="${displayImg}" style="width:100%; height:150px; object-fit:cover; border-radius:10px;" onerror="this.src='https://via.placeholder.com/300x150?text=My+Tool'">
                    <h3 style="margin: 15px 0 5px;">${file.name.replace('.html', '').toUpperCase()}</h3>
                    <p style="color: #666; font-size: 0.85em; padding: 0 10px; min-height: 40px;">${metaDesc}</p>
                    <a href="${file.name}" class="btn">點此開啟</a>
                `;
                container.appendChild(card);
            }
        } catch (e) {
            container.innerHTML = `<div style="color:red;">掃描失敗: ${e.message}</div>`;
        }
    }
    fetchTools();
</script>
</body>
</html>
