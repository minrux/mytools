<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的雲端工具箱</title>
    <style>
    body { 
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        background: #fdf5f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 40px 20px; 
        margin: 0;
    }

    h1 { color: #333; margin-bottom: 40px; }

    /* 核心：自適應網格容器 */
    #tool-container { 
        display: grid; 
        /* 每個卡片最小 280px，剩下的空間自動填滿 */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 25px; 
        width: 100%; 
        max-width: 1200px; /* 限制最大寬度，避免在大螢幕太散 */
    }

    .card { 
        background: white; 
        border-radius: 20px; 
        padding: 30px 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        text-align: center; 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card:hover { transform: translateY(-10px); }

    .card h3 { color: #444; margin-bottom: 10px; }

    .card p { color: #777; font-size: 0.9em; margin-bottom: 20px; }

    .btn { 
        background: #ffb7b7; 
        color: white; 
        text-decoration: none; 
        padding: 12px 25px; 
        border-radius: 25px; 
        display: inline-block;
        font-weight: bold;
    }
</style>
</head>
<body>
    <h1>🚀 我的雲端工具自動選單</h1>
    <div id="tool-container">正在掃描雲端檔案...</div>

    <script>
        // 【請修改這裡！】
        const GITHUB_USER = "minrux"; 
        const REPO_NAME = "mytools";

        async function fetchTools() {
            try {
                // 向 GitHub API 請求檔案清單 
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/`);
                const files = await response.json();
                const container = document.getElementById('tool-container');
                container.innerHTML = '';

                // 過濾出所有的 HTML 檔案，但不包含首頁自己
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                htmlFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // 將檔名美化（去掉 .html）
                    const displayName = file.name.replace('.html', '').toUpperCase();
                    card.innerHTML = `
                        <h3>${displayName}</h3>
                        <a href="${file.name}" class="btn">開啟工具</a>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('tool-container').innerText = "讀取清單失敗，請確認設定。";
            }
        }
        fetchTools();
    </script>
</body>
</html>
