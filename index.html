<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的雲端工具箱</title>
    <style>
    body { 
        font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        background: #fdf5f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 40px 20px; 
        margin: 0;
    }

    h1 { color: #333; margin-bottom: 40px; }

    /* 核心：自適應網格容器 */
    #tool-container { 
        display: grid; 
        /* 每個卡片最小 280px，剩下的空間自動填滿 */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 25px; 
        width: 100%; 
        max-width: 1200px; /* 限制最大寬度，避免在大螢幕太散 */
    }

    .card { 
        background: white; 
        border-radius: 20px; 
        padding: 30px 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        text-align: center; 
        transition: transform 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card:hover { transform: translateY(-10px); }

    .card h3 { color: #444; margin-bottom: 10px; }

    .card p { color: #777; font-size: 0.9em; margin-bottom: 20px; }

    .btn { 
        background: #ffb7b7; 
        color: white; 
        text-decoration: none; 
        padding: 12px 25px; 
        border-radius: 25px; 
        display: inline-block;
        font-weight: bold;
    }
        /* 貼在 <style> 標籤內 */
#winner-overlay {
    background: rgba(10, 15, 28, 0.85); /* 深邃底色 */
    backdrop-filter: blur(15px); /* 毛玻璃模糊 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.winner-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 15px 25px;
    color: #fff;
    animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards; /* 入場動畫 */
    /* ...其他樣式... */
}

@keyframes cardPop {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
</style>
</head>
<body>
    <h1>🚀 我的雲端工具自動選單</h1>
    <div id="tool-container">正在掃描雲端檔案...</div>

<script>
    const GITHUB_USER = "minrux"; 
    const REPO_NAME = "mytools";

    async function fetchTools() {
        const container = document.getElementById('tool-container');
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/`);
            if (!response.ok) throw new Error(`連線失敗: ${response.status}`);
            
            const files = await response.json();
            container.innerHTML = '';

            const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

            for (const file of htmlFiles) {
                const card = document.createElement('div');
                card.className = 'card';
                
                try {
                    // 1. 抓取檔案內容
                    const fileRes = await fetch(file.download_url);
                    const htmlText = await fileRes.text();
                    
                    // 2. 解析 HTML 內容
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    
                    // 🌟 關鍵：直接抓取 <title> 標籤內容
                    const pageTitle = doc.title || file.name.replace('.html', '');
                    
                    // 3. 抓取說明文字（如果有的話）
                    const metaDesc = doc.querySelector('meta[name="description"]')?.content 
                                    || "點擊下方按鈕開啟。";

                    card.innerHTML = `
                        <h3 style="color: #333; margin: 0; font-size: 1.4rem;">${pageTitle}</h3>
                        <small style="color: #bbb; font-family: monospace;">${file.name}</small>
                        <p style="color: #666; font-size: 0.95em; margin: 15px 0; line-height: 1.6;">
                            ${metaDesc}
                        </p>
                        <a href="${file.name}" class="btn">立即進入</a>
                    `;
                    container.appendChild(card);
                } catch (err) {
                    console.error(`讀取 ${file.name} 失敗`, err);
                }
            }
        } catch (e) {
            container.innerHTML = `<div style="color:red; padding:20px;">❌ 掃描失敗: ${e.message}</div>`;
        }
    }
    fetchTools();
</script>
</body>
</html>
