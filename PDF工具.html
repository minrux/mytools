<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 工具箱 (免安裝版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .selected-card { border: 4px solid #3b82f6 !important; background-color: #eff6ff !important; transform: scale(1.05); }
        .preview-item:hover { transform: translateY(-5px); transition: all 0.2s; }
        #loader { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32 font-sans">

    <div id="loader" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-blue-800">瀏覽器運算中，請稍候...</p>
    </div>

    <div class="max-w-5xl mx-auto py-12 px-6">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase">
                <i class="fa-solid fa-file-pdf text-red-500"></i> PDF <span class="text-blue-600">Pure Web</span> Tool
            </h1>
            <p class="text-slate-500 mt-2 font-medium">免安裝 Python，直接點開即用</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><i class="fa-solid fa-layer-group text-blue-500"></i> 功能一：合併多個 PDF</h3>
            <div class="flex flex-wrap items-center gap-4">
                <input type="file" id="merge-input" multiple accept=".pdf" class="text-sm text-slate-500">
                <button onclick="mergePDFs()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">開始合併下載</button>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-700 mb-6 flex items-center gap-2"><i class="fa-solid fa-eye text-purple-500"></i> 功能二：視覺化預覽、分割與轉圖</h3>
            <div class="border-2 border-dashed border-slate-200 rounded-2xl py-12 text-center hover:border-purple-400 cursor-pointer transition bg-slate-50" onclick="document.getElementById('pdf-input').click()">
                <i class="fa-solid fa-cloud-arrow-up text-5xl text-slate-300 mb-4"></i>
                <p class="text-slate-500 font-bold">點擊上傳 PDF (Excel 請先另存為 PDF 再上傳)</p>
                <input type="file" id="pdf-input" class="hidden" accept=".pdf">
            </div>
            
            <div id="preview-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mt-8"></div>
        </div>
    </div>

    <div id="action-bar" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl hidden items-center gap-8 z-50">
        <p class="font-bold border-r border-slate-700 pr-8 text-sm">已選取 <span id="count" class="text-blue-400 text-xl font-black">0</span> 頁</p>
        <div class="flex gap-4">
            <button onclick="extractToJPG()" class="bg-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-500 text-sm flex items-center gap-2">
                <i class="fa-solid fa-image"></i> 轉為 JPG
            </button>
            <button onclick="extractToPDF()" class="bg-red-600 px-6 py-2 rounded-full font-bold hover:bg-red-500 text-sm flex items-center gap-2">
                <i class="fa-solid fa-scissors"></i> 提取選取頁
            </button>
        </div>
        <button onclick="location.reload()" class="text-slate-400 hover:text-white transition px-2">
            <i class="fa-solid fa-rotate-left"></i>
        </button>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const countEl = document.getElementById('count');
        const actionBar = document.getElementById('action-bar');
        const previewGrid = document.getElementById('preview-grid');
        let selectedIndices = new Set();
        let currentPdfData = null;

        // 設定 PDF.js 的 Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // --- 功能：合併 ---
        async function mergePDFs() {
            const files = document.getElementById('merge-input').files;
            if (files.length < 2) return alert("請至少選擇兩個檔案進行合併");
            loader.style.display = 'flex';
            
            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (let file of files) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }
                const pdfBytes = await mergedPdf.save();
                downloadFile(pdfBytes, "合併結果.pdf", "application/pdf");
            } catch (e) {
                alert("合併失敗：" + e.message);
            }
            loader.style.display = 'none';
        }

        // --- 功能：載入預覽 ---
        document.getElementById('pdf-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            loader.style.display = 'flex';
            selectedIndices.clear();
            updateUI();

            currentPdfData = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: currentPdfData}).promise;
            previewGrid.innerHTML = '';

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 0.3 });
                const canvas = document.createElement('canvas');
                canvas.className = "w-full rounded shadow-sm mb-2";
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                const card = document.createElement('div');
                card.className = "preview-item p-2 bg-slate-100 rounded-xl border-4 border-transparent cursor-pointer transition";
                card.innerHTML = `<p class="text-center text-[10px] font-black text-slate-400">PAGE ${i}</p>`;
                card.prepend(canvas);
                
                card.onclick = () => {
                    if(selectedIndices.has(i-1)) {
                        selectedIndices.delete(i-1);
                        card.classList.remove('selected-card');
                    } else {
                        selectedIndices.add(i-1);
                        card.classList.add('selected-card');
                    }
                    updateUI();
                };
                previewGrid.appendChild(card);
            }
            loader.style.display = 'none';
        };

        // --- 功能：提取 PDF ---
        async function extractToPDF() {
            loader.style.display = 'flex';
            const pdfDoc = await PDFLib.PDFDocument.load(currentPdfData);
            const newPdf = await PDFLib.PDFDocument.create();
            const sortedIndices = Array.from(selectedIndices).sort((a,b) => a - b);
            const copiedPages = await newPdf.copyPages(pdfDoc, sortedIndices);
            copiedPages.forEach(page => newPdf.addPage(page));
            const pdfBytes = await newPdf.save();
            downloadFile(pdfBytes, "提取頁面.pdf", "application/pdf");
            loader.style.display = 'none';
        }

        // --- 功能：轉 JPG (示範首選頁) ---
        async function extractToJPG() {
            loader.style.display = 'flex';
            const pdf = await pdfjsLib.getDocument({data: currentPdfData}).promise;
            const sortedIndices = Array.from(selectedIndices).sort((a,b) => a - b);
            
            // 為了簡便，純網頁版轉 JPG 建議單張處理或連續觸發下載
            for (let idx of sortedIndices) {
                const page = await pdf.getPage(idx + 1);
                const viewport = page.getViewport({ scale: 2.0 }); // 高解析度
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.download = `頁面_${idx + 1}.jpg`;
                link.click();
            }
            loader.style.display = 'none';
        }

        function updateUI() {
            countEl.innerText = selectedIndices.size;
            actionBar.style.display = selectedIndices.size > 0 ? 'flex' : 'none';
        }

        function downloadFile(data, filename, type) {
            const blob = new Blob([data], { type: type });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
    </script>
</body>
</html>
